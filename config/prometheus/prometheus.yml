global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'airflow'
    static_configs:
      - targets: ['airflow-webserver:8080']
    metrics_path: '/metrics'

  - job_name: 'statsd_exporter'
    static_configs:
      - targets: ['statsd-exporter:9102']

  - job_name: 'spark'
    static_configs:
      - targets: ['spark-master:4040']
    metrics_path: '/metrics/json'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
